# H3.6C — Único deployer Fly.io de produção (só paths funcionais; sem workflows/scripts).
# Alterações em .github/workflows/**, docs/** ou scripts/** NÃO disparam deploy automático.
# Snapshot V1: ver docs/relatorios/H3-6C-PRE-SNAPSHOT-ROLLBACK-V1-2026-05-17.md
name: 🚀 Backend Deploy (Fly.io)

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'server-fly.js'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'fly.toml'
      - 'config/**'
      - 'controllers/**'
      - 'middlewares/**'
      - 'services/**'
      - 'src/**'
      - 'utils/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'server-fly.js'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'fly.toml'
      - 'config/**'
      - 'controllers/**'
      - 'middlewares/**'
      - 'services/**'
      - 'src/**'
      - 'utils/**'
  workflow_dispatch:
    inputs:
      release_sha:
        description: 'SHA Git a publicar (vazio = HEAD do branch)'
        required: false
        type: string

env:
  NODE_VERSION: '20'
  FLY_APP_NAME: goldeouro-backend-v2

jobs:
  test-and-analyze:
    name: 🧪 Testes e Análise
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_sha || github.sha }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔍 Análise de segurança
        continue-on-error: true
        run: npm audit --audit-level=moderate || echo "⚠️ npm audit com avisos"

      - name: 🧪 Executar testes
        run: |
          if [ -f "tests/backend-tests.js" ]; then
            npm test
          else
            echo "⚠️ tests/backend-tests.js ausente — skip"
          fi

      - name: 📊 Análise de qualidade
        run: |
          node -c server-fly.js
          test -f package.json && test -f server-fly.js && test -f fly.toml

  deploy-backend:
    name: 🚀 Deploy Backend (prod)
    runs-on: ubuntu-latest
    needs: test-and-analyze
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 30
    concurrency:
      # env.* não é permitido em concurrency.group (GitHub Actions schema)
      group: fly-production-goldeouro-backend-v2
      cancel-in-progress: false
    env:
      RELEASE_SHA: ${{ github.event.inputs.release_sha || github.sha }}

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔐 Configurar Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: 📌 Rastreabilidade release
        run: |
          echo "RELEASE_SHA=${RELEASE_SHA}"
          git log -1 --oneline
          echo "::notice title=Fly deploy::app=${{ env.FLY_APP_NAME }} sha=${RELEASE_SHA}"

      - name: 🚀 Deploy para Fly.io (canónico)
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "❌ FLY_API_TOKEN não configurado — deploy abortado"
            exit 1
          fi
          flyctl deploy --remote-only --no-cache \
            --app "${{ env.FLY_APP_NAME }}" \
            --build-arg GIT_COMMIT="${RELEASE_SHA}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 🔍 Verificar status Fly
        run: flyctl status --app "${{ env.FLY_APP_NAME }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 🧪 Gate — /health (obrigatório)
        run: |
          set -euo pipefail
          HEALTH_URL="https://${{ env.FLY_APP_NAME }}.fly.dev/health"
          SUCCESS=0
          for i in 1 2 3 4 5; do
            echo "Tentativa $i/5 → $HEALTH_URL"
            if curl -fsS --max-time 30 "$HEALTH_URL"; then
              SUCCESS=1
              break
            fi
            sleep $((i * 5))
          done
          if [ "$SUCCESS" != "1" ]; then
            echo "❌ /health falhou — ver rollback em H3-6C-PRE-SNAPSHOT"
            exit 1
          fi

      - name: 🧭 Gate — /meta.gitCommit === RELEASE_SHA
        run: |
          set -euo pipefail
          META_URL="https://${{ env.FLY_APP_NAME }}.fly.dev/meta"
          EXPECT="${RELEASE_SHA}"
          BODY=$(curl -fsS --max-time 30 "$META_URL")
          ACTUAL=$(echo "$BODY" | jq -r '.data.gitCommit // empty')
          echo "Esperado: $EXPECT"
          echo "Observado: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "❌ /meta sem gitCommit"
            exit 1
          fi
          if [ "$ACTUAL" != "$EXPECT" ]; then
            echo "❌ Divergência runtime — rollback recomendado: flyctl releases rollback -a ${{ env.FLY_APP_NAME }}"
            exit 1
          fi
          echo "✅ /meta alinhado ao SHA publicado"

      - name: 📢 Resumo deploy
        run: |
          echo "🎉 Backend Fly publicado"
          echo "   App:  ${{ env.FLY_APP_NAME }}"
          echo "   SHA:  ${RELEASE_SHA}"
          echo "   Meta: https://${{ env.FLY_APP_NAME }}.fly.dev/meta"

  deploy-dev:
    name: 🔄 Deploy Dev
    runs-on: ubuntu-latest
    needs: test-and-analyze
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    timeout-minutes: 30
    concurrency:
      group: fly-dev-goldeouro-backend-v2
      cancel-in-progress: false

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔐 Configurar Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: 🚀 Deploy desenvolvimento
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "❌ FLY_API_TOKEN não configurado"
            exit 1
          fi
          flyctl deploy --remote-only --no-cache \
            --app "${{ env.FLY_APP_NAME }}" \
            --build-arg GIT_COMMIT="${{ github.sha }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
