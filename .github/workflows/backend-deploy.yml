name: 🚀 Backend Deploy (Fly.io)

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'server-fly.js'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'fly.toml'
      - 'config/**'
      - 'controllers/**'
      - 'middlewares/**'
      - 'services/**'
      - 'scripts/**'
      - '.github/workflows/backend-deploy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'server-fly.js'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'fly.toml'
      - 'config/**'
      - 'controllers/**'
      - 'middlewares/**'
      - 'services/**'
      - 'scripts/**'

env:
  NODE_VERSION: '20'
  FLY_APP_NAME: goldeouro-backend-v2  # ✅ CORRIGIDO

jobs:
  # 🔍 Análise de Código e Testes
  test-and-analyze:
    name: 🧪 Testes e Análise
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📦 Instalar dependências
        run: |
          npm ci
          echo "✅ Dependências instaladas"
          
      - name: 🔍 Análise de segurança
        continue-on-error: true
        run: |
          echo "🔍 Analisando vulnerabilidades..."
          npm audit --audit-level=moderate || {
            echo "⚠️ Vulnerabilidades encontradas (não bloqueia deploy)"
            echo "💡 Para corrigir: npm audit fix ou atualizar dependências manualmente"
          }
          echo "✅ Análise de segurança concluída"
          
      - name: 🧪 Executar testes
        run: |
          if [ -f "tests/backend-tests.js" ]; then
            npm test
          else
            echo "⚠️ Arquivo de testes não encontrado, pulando testes"
          fi
          echo "✅ Testes executados"
          
      - name: 📊 Análise de qualidade
        run: |
          echo "🔍 Verificando sintaxe..."
          node -c server-fly.js
          echo "✅ Sintaxe válida"
          
          echo "🔍 Verificando estrutura..."
          if [ -f "package.json" ] && [ -f "server-fly.js" ] && [ -f "fly.toml" ]; then
            echo "✅ Estrutura válida"
          else
            echo "❌ Estrutura inválida"
            exit 1
          fi

  # 🚀 Deploy para Fly.io
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: test-and-analyze
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📦 Instalar dependências
        run: |
          npm ci
          echo "✅ Dependências instaladas"
          
      - name: 🔐 Configurar Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master
        
      - name: 🚀 Deploy para Fly.io
        run: |
          echo "🚀 Iniciando deploy para Fly.io..."
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "⚠️ FLY_API_TOKEN não configurado. Pulando deploy."
            exit 0
          fi
          flyctl deploy --remote-only --no-cache --app ${{ env.FLY_APP_NAME }} --build-arg GIT_COMMIT="${{ github.sha }}"
          echo "✅ Deploy concluído"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          
      - name: 🔍 Verificar deploy
        run: |
          echo "🔍 Verificando status do deploy..."
          flyctl status --app ${{ env.FLY_APP_NAME }}
          echo "✅ Verificação concluída"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          
      - name: 📊 Logs do deploy
        run: |
          echo "📊 Coletando logs..."
          flyctl logs --app ${{ env.FLY_APP_NAME }} --no-tail
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          
      - name: 🧪 Teste de saúde (retry com backoff)
        run: |
          echo "🧪 Testando endpoint de saúde..."
          HEALTH_URL="https://${{ env.FLY_APP_NAME }}.fly.dev/health"
          SUCCESS=0
          # 5 tentativas com backoff progressivo para reduzir falso-negativo transitório
          for i in 1 2 3 4 5; do
            case $i in
              1) WAIT=5 ;;
              2) WAIT=10 ;;
              3) WAIT=20 ;;
              4) WAIT=30 ;;
              5) WAIT=45 ;;
            esac
            echo "Tentativa $i/5 → GET $HEALTH_URL"
            if curl -fsS --max-time 30 "$HEALTH_URL"; then
              echo "✅ Endpoint de saúde respondeu com sucesso na tentativa $i"
              SUCCESS=1
              break
            fi
            if [ $i -lt 5 ]; then
              echo "⚠️ Tentativa $i falhou; aguardando ${WAIT}s..."
              sleep "$WAIT"
            fi
          done
          if [ "$SUCCESS" = "0" ]; then
            echo "❌ Health check falhou após 5 tentativas com backoff."
            echo "📘 Rollback manual recomendado:"
            echo "1) flyctl releases --app ${{ env.FLY_APP_NAME }} --image"
            echo "2) escolher a última release complete"
            echo "3) flyctl deploy --app ${{ env.FLY_APP_NAME }} --image <IMAGE_ESTAVEL>"
            exit 1
          fi
          
      - name: 📢 Notificar sucesso
        run: |
          echo "🎉 Deploy do backend concluído com sucesso!"
          echo "🌐 URL: https://${{ env.FLY_APP_NAME }}.fly.dev"
          echo "📊 Status: Online"

  # 🔄 Deploy para desenvolvimento
  deploy-dev:
    name: 🔄 Deploy Dev
    runs-on: ubuntu-latest
    needs: test-and-analyze
    if: github.ref == 'refs/heads/dev'
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📦 Instalar dependências
        run: |
          npm ci
          echo "✅ Dependências instaladas"
          
      - name: 🔐 Configurar Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master
        
      - name: 🚀 Deploy para desenvolvimento
        run: |
          echo "🔄 Deploy para ambiente de desenvolvimento..."
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "⚠️ FLY_API_TOKEN não configurado. Pulando deploy."
            exit 0
          fi
          flyctl deploy --remote-only --no-cache --app ${{ env.FLY_APP_NAME }} --build-arg GIT_COMMIT="${{ github.sha }}"
          echo "✅ Deploy de desenvolvimento concluído"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          
      - name: 📢 Notificar deploy dev
        run: |
          echo "🔄 Deploy de desenvolvimento concluído!"
          echo "🌐 URL: https://${{ env.FLY_APP_NAME }}.fly.dev"
          echo "📊 Status: Ambiente de desenvolvimento"
