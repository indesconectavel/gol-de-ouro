# H3.6C — Break-glass: preview Vercel apenas. Fly prod canónico → backend-deploy.yml (workflow_dispatch).
name: Deploy On Demand (preview player)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente alvo (apenas preview player)"
        required: true
        default: production
        type: choice
        options:
          - production

permissions:
  contents: read

jobs:
  deploy-player-vercel:
    name: Player (Vercel preview)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Produção pública do player: apenas frontend-deploy.yml. Aqui só preview (não --prod).
      - name: Deploy com Vercel Action
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PLAYER }}
          working-directory: ./goldeouro-player
          vercel-args: '--target preview'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Informações pós-deploy
        run: |
          echo "✅ Player implantado como preview (não produção). Ver URL no log do vercel-action."
          echo "ℹ️ Produção: workflow frontend-deploy.yml. Cache: Vercel Dashboard -> Project -> Settings -> Cache."


