name: 🚀 Pipeline Principal - Gol de Ouro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  FLY_APP_NAME: goldeouro-backend-v2  # ✅ CORRIGIDO: Especifica app explicitamente

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 🔍 Checkout do código
        uses: actions/checkout@v6

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: |
          echo "📦 Instalando dependências..."
          npm ci
          echo "✅ Dependências instaladas com sucesso"

      - name: 🔍 Validar estrutura do projeto
        run: |
          echo "🔍 Validando estrutura do projeto..."
          test -f package.json && echo "✅ package.json encontrado"
          test -f server-fly.js && echo "✅ server-fly.js encontrado"
          test -f fly.toml && echo "✅ fly.toml encontrado"
          echo "✅ Validação concluída"

      - name: 🚀 Deploy Backend (Fly.io)
        uses: superfly/flyctl-actions@master
        with:
          args: "deploy --remote-only --app ${{ env.FLY_APP_NAME }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        continue-on-error: true

      # REMOVIDO: deploy do frontend agora é exclusivo do frontend-deploy.yml
      # (passo anterior: npx vercel --prod --yes em goldeouro-player)

      - name: ✅ Validar endpoints principais
        continue-on-error: true
        run: |
          echo "🔍 Testando endpoints de produção..."
          # Retry logic: 3 tentativas
          SUCCESS=0
          for i in {1..3}; do
            echo "Tentativa $i de 3..."
            if curl -f --max-time 30 https://goldeouro-backend-v2.fly.dev/health; then
              echo "✅ Health check bem-sucedido na tentativa $i"
              SUCCESS=1
              break
            fi
            if [ $i -lt 3 ]; then
              echo "⏳ Aguardando 10s antes da próxima tentativa..."
              sleep 10
            fi
          done
          if [ "$SUCCESS" = "0" ]; then
            echo "⚠️ Health check falhou após 3 tentativas"
          fi
          echo "✅ Validação concluída"

      - name: 📊 Upload artifacts de deploy
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-artifacts-${{ github.run_number }}
          path: |
            package-lock.json
            dist/
            build/
          retention-days: 7

      - name: 📊 Log final
        run: |
          echo "=================================================="
          echo "🏆 DEPLOY DO GOL DE OURO CONCLUÍDO COM SUCESSO!"
          echo "🌐 Frontend: https://goldeouro.lol"
          echo "⚙️ Backend:  https://goldeouro-backend-v2.fly.dev"
          echo "📊 Admin:    https://admin.goldeouro.lol"
          echo "📱 Mobile:   APK disponível nos artifacts"
          echo "=================================================="