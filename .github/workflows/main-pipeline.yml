# H3.6C — Integração contínua em main (SEM deploy Fly).
# Deploy backend canónico: backend-deploy.yml
# Deploy frontend prod: frontend-deploy.yml
name: 🚀 Pipeline Principal - Gol de Ouro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  FLY_APP_NAME: goldeouro-backend-v2

jobs:
  ci-main:
    name: 🔍 CI Main (sem publicar)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: |
          npm ci
          echo "✅ Dependências instaladas"

      - name: 🔍 Validar estrutura do projeto
        run: |
          test -f package.json && echo "✅ package.json"
          test -f server-fly.js && echo "✅ server-fly.js"
          test -f fly.toml && echo "✅ fly.toml"
          node -c server-fly.js
          echo "✅ Sintaxe server-fly.js"

      - name: 📋 Governança H3.6C — deployers oficiais
        run: |
          echo "ℹ️ Este workflow NÃO publica em produção (H3.6C)."
          echo "   Backend Fly  → .github/workflows/backend-deploy.yml"
          echo "   Frontend prod → .github/workflows/frontend-deploy.yml"
          echo "   Docs/*.md    → não disparam backend-deploy (paths-filter)"
          echo "   SHA integração: ${{ github.sha }}"

      - name: ❤️ Smoke read-only produção (opcional)
        continue-on-error: true
        run: |
          set -euo pipefail
          for url in \
            "https://${{ env.FLY_APP_NAME }}.fly.dev/health" \
            "https://www.goldeouro.lol/"
          do
            code=$(curl -sSL -o /dev/null -w "%{http_code}" --max-time 25 "$url" || echo "000")
            echo "$url → HTTP $code"
          done

      - name: 📊 Upload artifacts de CI
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-main-${{ github.run_number }}
          path: |
            package-lock.json
          retention-days: 7

      - name: 📊 Log final
        run: |
          echo "=================================================="
          echo "✅ CI main concluído (sem deploy)"
          echo "⚙️ Backend prod: backend-deploy.yml"
          echo "🌐 Frontend prod: frontend-deploy.yml"
          echo "=================================================="
