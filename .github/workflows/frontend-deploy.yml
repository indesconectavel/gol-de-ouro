name: 🎨 Frontend Deploy (Vercel)
# Governação / fechamento enterprise: docs/relatorios/FECHAMENTO-OFICIAL-PIPELINE-FRONTEND-ENTERPRISE-2026-04-04.md
# Gates SPA / blindagem: docs/relatorios/BLINDAGEM-DEFINITIVA-ENTERPRISE-PIPELINE-PLAYER-2026-04-05.md

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'goldeouro-player/**'
      - '.github/workflows/frontend-deploy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'goldeouro-player/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  # ID real do projeto Vercel vem de secrets.VERCEL_PROJECT_ID (prj_xxx), não do nome "goldeouro-player".
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  # 🔍 Análise e Testes do Frontend
  test-frontend:
    name: 🧪 Testes Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: goldeouro-player/package-lock.json
          
      - name: 📦 Instalar dependências frontend
        run: |
          cd goldeouro-player
          npm ci
          echo "✅ Dependências do frontend instaladas"
          
      - name: 🔍 Análise de segurança frontend
        run: |
          cd goldeouro-player
          npm audit --audit-level=moderate || echo "⚠️ Vulnerabilidades encontradas no frontend"
          echo "✅ Análise de segurança do frontend concluída"
          
      - name: 🧪 Executar testes frontend
        run: |
          cd goldeouro-player
          if [ -f "tests/frontend-tests.js" ]; then
            npm test
          else
            echo "⚠️ Arquivo de testes não encontrado, pulando testes"
          fi
          echo "✅ Testes do frontend executados"
          
      - name: 🔍 Verificar sintaxe
        run: |
          cd goldeouro-player
          echo "🔍 Verificando sintaxe dos componentes..."
          npx eslint src/ --ext .js,.jsx,.ts,.tsx --max-warnings 0 || echo "⚠️ Avisos de linting encontrados"
          echo "✅ Verificação de sintaxe concluída"
          
      - name: 🏗️ Build de teste
        run: |
          cd goldeouro-player
          echo "🏗️ Executando build de teste..."
          npm run build
          echo "✅ Build de teste concluído"
          
      - name: 📊 Análise de bundle
        run: |
          cd goldeouro-player
          echo "📊 Analisando tamanho do bundle..."
          ls -la dist/
          echo "✅ Análise de bundle concluída"

  # 🚀 Deploy para Vercel (Produção)
  deploy-production:
    name: 🚀 Deploy Produção
    runs-on: ubuntu-latest
    needs: test-frontend
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    concurrency:
      group: frontend-vercel-production
      cancel-in-progress: false
    outputs:
      deploy-sha: ${{ steps.deploy_evidence.outputs.deploy_sha }}
      deploy-url: ${{ steps.deploy_evidence.outputs.deploy_url }}
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: goldeouro-player/package-lock.json
          
      - name: 📦 Instalar dependências
        run: |
          cd goldeouro-player
          npm ci
          echo "✅ Dependências instaladas"
          
      - name: 🏗️ Build para produção
        run: |
          cd goldeouro-player
          npm run build
          echo "✅ Build concluído"
          ls -la dist/
          
      - name: 🔍 Verificar arquivos críticos
        run: |
          cd goldeouro-player
          test -f dist/index.html && echo "✅ index.html encontrado" || (echo "❌ index.html não encontrado" && exit 1)
          test -f dist/favicon.png && echo "✅ favicon.png encontrado" || echo "⚠️ favicon.png não encontrado"
          echo "✅ Verificação concluída"
          
      - name: 📌 Rastreabilidade — commit e ref
        run: |
          echo "DEPLOY_SHA=${GITHUB_SHA}"
          echo "DEPLOY_REF=${GITHUB_REF}"
          echo "Commit: $(git log -1 --oneline)"
          echo "::notice title=Deploy produção::SHA=${GITHUB_SHA} ref=${GITHUB_REF}"

      - name: 🔐 Verificar tokens Vercel
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "❌ Tokens Vercel não configurados. Deploy não pode continuar."
            exit 1
          fi
          echo "✅ Tokens Vercel configurados"

      # Deploy produção: apenas push em main (paths filtrados). Branch canônica de baseline deve integrar via PR → main.
      # Não usar --yes (CLI Vercel rejeita); token + CI já são não-interativos.
      - name: 📤 Deploy Vercel (produção)
        id: vercel_production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-version: '50.38.3'
          vercel-args: '--prod'

      - name: 📋 Gate — evidências obrigatórias (SHA + URL Vercel)
        id: deploy_evidence
        if: success()
        run: |
          set -euo pipefail
          URL="${{ steps.vercel_production.outputs.preview-url }}"
          URL="${URL//[$'\r\n']}"
          if [ -z "$URL" ]; then
            echo "❌ Gate falhou: output preview-url do deploy está vazio. Produção não pode ser marcada como saudável sem URL de deployment."
            exit 1
          fi
          echo "deploy_url=$URL" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "::notice title=Evidência deploy::SHA=$GITHUB_SHA url=$URL run=${{ github.run_id }}"
          {
            echo "## Produção — evidências (gate enterprise)"
            echo ""
            echo "| Campo | Valor |"
            echo "|--------|--------|"
            echo "| GitHub Run ID | \`${{ github.run_id }}\` |"
            echo "| Commit SHA | \`$GITHUB_SHA\` |"
            echo "| Ref | \`${{ github.ref }}\` |"
            echo "| URL deployment (Vercel) | $URL |"
            echo "| Domínios canónicos | www + apex \`goldeouro.lol\` |"
            echo "| Gates pós-deploy | smoke + health + **deep links** \`/dashboard\` e \`/register\` (sem \`NOT_FOUND\`) |"
            echo ""
            echo "Rollback manual documentado: workflow \`frontend-rollback-manual.yml\` (confirmar com \`ROLLBACK\`)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 🧪 Smoke test HTTP (prod)
        if: success()
        run: |
          set -euo pipefail
          echo "::group::Smoke — www + apex (até 6 tentativas, -L, log de status)"
          SUCCESS=0
          for i in {1..6}; do
            echo "Tentativa $i de 6..."
            code_www=$(curl -sSL -o /dev/null -w "%{http_code}" --max-time 30 "https://www.goldeouro.lol/" || echo "000")
            code_apex=$(curl -sSL -o /dev/null -w "%{http_code}" --max-time 30 "https://goldeouro.lol/" || echo "000")
            echo "  URL: https://www.goldeouro.lol/ → HTTP $code_www"
            echo "  URL: https://goldeouro.lol/ → HTTP $code_apex (cadeia final após redirects)"
            if [ "$code_www" = "200" ] && [ "$code_apex" = "200" ]; then
              echo "✅ Smoke test OK (www + apex → 200)"
              SUCCESS=1
              break
            fi
            if [ "$i" -lt 6 ]; then
              echo "⏳ Aguardando 10s..."
              sleep 10
            fi
          done
          echo "::endgroup::"
          if [ "$SUCCESS" = "0" ]; then
            echo "❌ Smoke test falhou após 6 tentativas — gate de produção bloqueado."
            exit 1
          fi

      - name: ❤️ Health check pós-deploy (HTTP + HTML mínimo)
        if: success()
        run: |
          set -euo pipefail
          echo "::group::Health — HTML mínimo explícito (www + apex, -L + --compressed)"
          for url in "https://www.goldeouro.lol/" "https://goldeouro.lol/"; do
            echo "URL testada: $url"
            code=$(curl -sSL --compressed -o /tmp/gdo-health.html -w "%{http_code}" --max-time 30 "$url" || echo "000")
            echo "  HTTP status (final): $code"
            if [ "$code" != "200" ]; then
              echo "❌ $url → HTTP $code após redirects (esperado 200)"
              exit 1
            fi
            if ! grep -qiE '<html|<!DOCTYPE' /tmp/gdo-health.html; then
              echo "❌ $url → corpo final não contém marcadores mínimos de HTML (gzip/redirect)"
              exit 1
            fi
            echo "  ✅ HTML mínimo: presente (<html ou <!DOCTYPE)"
            echo "✅ $url → 200 + HTML mínimo OK"
          done
          echo "::endgroup::"

      - name: 🛡️ Gate blindagem — deep links SPA (domínio canónico)
        if: success()
        run: |
          set -euo pipefail
          echo "::group::Blindagem — deep links (fonte de verdade: https://www.goldeouro.lol)"
          verify_deep() {
            local url="$1"
            local label="$2"
            local hdrf bodyf code
            hdrf=$(mktemp)
            bodyf=$(mktemp)
            trap 'rm -f "$hdrf" "$bodyf"' RETURN
            code=$(curl -sS --compressed -D "$hdrf" -o "$bodyf" -w "%{http_code}" --max-time 30 "$url" || echo "000")
            echo ""
            echo "─── $label ───"
            echo "URL testada: $url"
            echo "HTTP status: $code"
            echo "Cabeçalhos relevantes (filtro):"
            grep -iE '^(HTTP/|x-vercel-|server:)' "$hdrf" || true
            if [ "$code" != "200" ]; then
              echo "❌ GATE BLINDAGEM FALHOU: HTTP $code (esperado 200). Deep link não servido como SPA no edge."
              exit 1
            fi
            if grep -qi 'x-vercel-error:[[:space:]]*NOT_FOUND' "$hdrf"; then
              echo "❌ GATE BLINDAGEM FALHOU: cabeçalho X-Vercel-Error NOT_FOUND — fallback SPA ausente ou deployment incorreto."
              exit 1
            fi
            if ! grep -qiE '<html|<!DOCTYPE' "$bodyf"; then
              echo "❌ GATE BLINDAGEM FALHOU: corpo sem marcadores mínimos de HTML."
              exit 1
            fi
            echo "✅ Resultado: OK (200, sem NOT_FOUND, HTML mínimo)"
          }
          verify_deep "https://www.goldeouro.lol/dashboard" "Deep link /dashboard"
          verify_deep "https://www.goldeouro.lol/register" "Deep link /register"
          echo "::endgroup::"

      - name: 📢 Resumo deploy produção
        if: success()
        run: |
          echo "🎉 Gate de produção: deploy + evidências + smoke + health + blindagem deep links — OK."
          echo "🌐 Domínios: https://www.goldeouro.lol / https://goldeouro.lol"
          echo "📌 Commit SHA: ${GITHUB_SHA}"
          echo "🔗 URL deployment: ${{ steps.deploy_evidence.outputs.deploy_url }}"
          echo "🔙 Rollback: Actions → workflow_dispatch em frontend-rollback-manual.yml"

      - name: notify vercel
        if: always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: vercel-deploy

  # 🔄 Deploy para desenvolvimento
  deploy-development:
    name: 🔄 Deploy Desenvolvimento
    runs-on: ubuntu-latest
    needs: test-frontend
    if: github.ref == 'refs/heads/dev'
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: goldeouro-player/package-lock.json
          
      - name: 📦 Instalar dependências
        run: |
          cd goldeouro-player
          npm ci
          echo "✅ Dependências instaladas"
          
      - name: 🔐 Verificar tokens Vercel (Dev)
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "❌ Tokens Vercel não configurados. Deploy não pode continuar."
            exit 1
          fi
          echo "✅ Tokens Vercel configurados"

      - name: 📌 Rastreabilidade — commit e ref (dev)
        run: |
          echo "DEPLOY_SHA=${GITHUB_SHA}"
          echo "DEPLOY_REF=${GITHUB_REF}"
          echo "::notice title=Deploy preview dev::SHA=${GITHUB_SHA}"

      - name: 🔐 Configurar Vercel (Dev)
        id: vercel_preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-version: '50.38.3'
          vercel-args: '--target preview'

      - name: 📎 URL preview (dev)
        if: success()
        run: |
          echo "preview-url=${{ steps.vercel_preview.outputs.preview-url }}"
          
      - name: 📢 Notificar deploy dev
        run: |
          echo "🔄 Deploy de desenvolvimento concluído!"
          echo "🌐 URL: Preview disponível no Vercel"
          echo "📊 Status: Ambiente de desenvolvimento"

  # 📱 Build APK Android
  build-android:
    name: 📱 Build APK
    runs-on: ubuntu-latest
    needs: test-frontend
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: goldeouro-player/package-lock.json
          
      - name: 📦 Instalar dependências
        run: |
          cd goldeouro-player
          npm ci
          echo "✅ Dependências instaladas"
          
      - name: 🏗️ Build para produção
        run: |
          cd goldeouro-player
          npm run build
          echo "✅ Build concluído"
          
      - name: 📱 Gerar APK
        run: |
          cd goldeouro-player
          if [ -d "android" ]; then
            echo "📱 Gerando APK..."
            npm run build:android || echo "⚠️ Build APK falhou"
          else
            echo "⚠️ Diretório Android não encontrado"
          fi
          echo "✅ Processo APK concluído"
          
      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goldeouro-apk
          path: goldeouro-player/android/app/build/outputs/apk/
          retention-days: 30
