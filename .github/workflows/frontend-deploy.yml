name: 🎨 Frontend Deploy (Vercel)

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'goldeouro-player/**'
      - '.github/workflows/frontend-deploy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'goldeouro-player/**'

env:
  NODE_VERSION: '20'
  # ID real do projeto Vercel vem de secrets.VERCEL_PROJECT_ID (prj_xxx), não do nome "goldeouro-player".
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  # 🔍 Análise e Testes do Frontend
  test-frontend:
    name: 🧪 Testes Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: goldeouro-player/package-lock.json
          
      - name: 📦 Instalar dependências frontend
        run: |
          cd goldeouro-player
          npm ci
          echo "✅ Dependências do frontend instaladas"
          
      - name: 🔍 Análise de segurança frontend
        run: |
          cd goldeouro-player
          npm audit --audit-level=moderate || echo "⚠️ Vulnerabilidades encontradas no frontend"
          echo "✅ Análise de segurança do frontend concluída"
          
      - name: 🧪 Executar testes frontend
        run: |
          cd goldeouro-player
          if [ -f "tests/frontend-tests.js" ]; then
            npm test
          else
            echo "⚠️ Arquivo de testes não encontrado, pulando testes"
          fi
          echo "✅ Testes do frontend executados"
          
      - name: 🔍 Verificar sintaxe
        run: |
          cd goldeouro-player
          echo "🔍 Verificando sintaxe dos componentes..."
          npx eslint src/ --ext .js,.jsx,.ts,.tsx --max-warnings 0 || echo "⚠️ Avisos de linting encontrados"
          echo "✅ Verificação de sintaxe concluída"
          
      - name: 🏗️ Build de teste
        run: |
          cd goldeouro-player
          echo "🏗️ Executando build de teste..."
          npm run build
          echo "✅ Build de teste concluído"
          
      - name: 📊 Análise de bundle
        run: |
          cd goldeouro-player
          echo "📊 Analisando tamanho do bundle..."
          ls -la dist/
          echo "✅ Análise de bundle concluída"

  # 🚀 Deploy para Vercel (Produção)
  deploy-production:
    name: 🚀 Deploy Produção
    runs-on: ubuntu-latest
    needs: test-frontend
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    concurrency:
      group: frontend-vercel-production
      cancel-in-progress: false
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: goldeouro-player/package-lock.json
          
      - name: 📦 Instalar dependências
        run: |
          cd goldeouro-player
          npm ci
          echo "✅ Dependências instaladas"
          
      - name: 🏗️ Build para produção
        run: |
          cd goldeouro-player
          npm run build
          echo "✅ Build concluído"
          ls -la dist/
          
      - name: 🔍 Verificar arquivos críticos
        run: |
          cd goldeouro-player
          test -f dist/index.html && echo "✅ index.html encontrado" || (echo "❌ index.html não encontrado" && exit 1)
          test -f dist/favicon.png && echo "✅ favicon.png encontrado" || echo "⚠️ favicon.png não encontrado"
          echo "✅ Verificação concluída"
          
      - name: 📌 Rastreabilidade — commit e ref
        run: |
          echo "DEPLOY_SHA=${GITHUB_SHA}"
          echo "DEPLOY_REF=${GITHUB_REF}"
          echo "Commit: $(git log -1 --oneline)"
          echo "::notice title=Deploy produção::SHA=${GITHUB_SHA} ref=${GITHUB_REF}"

      - name: 🔐 Verificar tokens Vercel
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "❌ Tokens Vercel não configurados. Deploy não pode continuar."
            exit 1
          fi
          echo "✅ Tokens Vercel configurados"

      # Deploy produção: apenas push em main (paths filtrados). Branch canônica de baseline deve integrar via PR → main.
      # Não usar --yes (CLI Vercel rejeita); token + CI já são não-interativos.
      - name: 📤 Deploy Vercel (produção)
        id: vercel_production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: goldeouro-player
          vercel-args: '--prod'

      - name: 📎 URL de deploy (Vercel)
        if: success()
        run: |
          echo "preview-url output=${{ steps.vercel_production.outputs.preview-url }}"
          echo "Validar no dashboard Vercel: Deployment deste run deve corresponder ao SHA ${GITHUB_SHA}"

      - name: 🧪 Smoke test HTTP (prod)
        run: |
          echo "🧪 Smoke test após deploy (www + apex)..."
          SUCCESS=0
          for i in {1..6}; do
            echo "Tentativa $i de 6..."
            if curl -fsS --max-time 30 https://www.goldeouro.lol/ -o /dev/null && curl -fsS --max-time 30 https://goldeouro.lol/ -o /dev/null; then
              echo "✅ Smoke test OK (www + apex)"
              SUCCESS=1
              break
            fi
            if [ $i -lt 6 ]; then
              echo "⏳ Aguardando 10s..."
              sleep 10
            fi
          done
          if [ "$SUCCESS" = "0" ]; then
            echo "❌ Smoke test falhou após 6 tentativas"
            exit 1
          fi

      - name: 📢 Resumo deploy produção
        run: |
          echo "🎉 Deploy de produção concluído (vercel-action sem continue-on-error)."
          echo "🌐 Domínios: https://www.goldeouro.lol / https://goldeouro.lol"
          echo "📌 Commit SHA: ${GITHUB_SHA}"

  # 🔄 Deploy para desenvolvimento
  deploy-development:
    name: 🔄 Deploy Desenvolvimento
    runs-on: ubuntu-latest
    needs: test-frontend
    if: github.ref == 'refs/heads/dev'
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: goldeouro-player/package-lock.json
          
      - name: 📦 Instalar dependências
        run: |
          cd goldeouro-player
          npm ci
          echo "✅ Dependências instaladas"
          
      - name: 🔐 Verificar tokens Vercel (Dev)
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "❌ Tokens Vercel não configurados. Deploy não pode continuar."
            exit 1
          fi
          echo "✅ Tokens Vercel configurados"

      - name: 📌 Rastreabilidade — commit e ref (dev)
        run: |
          echo "DEPLOY_SHA=${GITHUB_SHA}"
          echo "DEPLOY_REF=${GITHUB_REF}"
          echo "::notice title=Deploy preview dev::SHA=${GITHUB_SHA}"

      - name: 🔐 Configurar Vercel (Dev)
        id: vercel_preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: goldeouro-player
          vercel-args: '--target preview'

      - name: 📎 URL preview (dev)
        if: success()
        run: |
          echo "preview-url=${{ steps.vercel_preview.outputs.preview-url }}"
          
      - name: 📢 Notificar deploy dev
        run: |
          echo "🔄 Deploy de desenvolvimento concluído!"
          echo "🌐 URL: Preview disponível no Vercel"
          echo "📊 Status: Ambiente de desenvolvimento"

  # 📱 Build APK Android
  build-android:
    name: 📱 Build APK
    runs-on: ubuntu-latest
    needs: test-frontend
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: goldeouro-player/package-lock.json
          
      - name: 📦 Instalar dependências
        run: |
          cd goldeouro-player
          npm ci
          echo "✅ Dependências instaladas"
          
      - name: 🏗️ Build para produção
        run: |
          cd goldeouro-player
          npm run build
          echo "✅ Build concluído"
          
      - name: 📱 Gerar APK
        run: |
          cd goldeouro-player
          if [ -d "android" ]; then
            echo "📱 Gerando APK..."
            npm run build:android || echo "⚠️ Build APK falhou"
          else
            echo "⚠️ Diretório Android não encontrado"
          fi
          echo "✅ Processo APK concluído"
          
      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goldeouro-apk
          path: goldeouro-player/android/app/build/outputs/apk/
          retention-days: 30
