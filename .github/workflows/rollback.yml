name: ⚠️ Rollback Automático – Gol de Ouro

on:
  workflow_run:
    workflows: ["🚀 Pipeline Principal - Gol de Ouro"]
    types:
      - completed

jobs:
  rollback:
    if: ${{ github.event.workflow_run.conclusion != 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30  # ✅ Adicionado timeout para evitar execução indefinida
    
    steps:
      - name: 🔄 Checkout do código
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: ⚙️ Configurar Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: 🔁 Rollback Backend (Fly.io)
        continue-on-error: true
        run: |
          echo "⚠️ Deploy do backend falhou. Iniciando rollback..."
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "⚠️ FLY_API_TOKEN não configurado. Pulando rollback do backend."
            exit 0
          fi
          
          # Listar releases disponíveis
          RELEASES=$(flyctl releases --app goldeouro-backend-v2 --json 2>/dev/null || echo "[]")
          if [ "$RELEASES" = "[]" ] || [ -z "$RELEASES" ]; then
            echo "⚠️ Nenhum release anterior encontrado. Rollback não possível."
            exit 0
          fi
          
          # Obter penúltimo release (último é o que falhou)
          LAST_RELEASE=$(echo "$RELEASES" | jq -r '.[1].version // .[0].version' 2>/dev/null || echo "")
          if [ -z "$LAST_RELEASE" ] || [ "$LAST_RELEASE" = "null" ]; then
            echo "⚠️ Não foi possível determinar release anterior. Rollback não possível."
            exit 0
          fi
          
          echo "🔄 Fazendo rollback para release: $LAST_RELEASE"
          flyctl releases rollback $LAST_RELEASE --app goldeouro-backend-v2 || {
            echo "⚠️ Rollback automático falhou. Verificar manualmente."
            exit 0
          }
          echo "✅ Rollback do backend concluído com sucesso."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # REMOVIDO: rollback automático do frontend desativado — controlado via pipeline canônico
      # (anteriormente: npx vercel promote; produção do player só via frontend-deploy.yml ou dashboard Vercel)
      - name: 🔁 Rollback Frontend (Vercel) — desativado
        run: |
          echo "ℹ️ Rollback automático do frontend desativado (unificação pipeline 2026-04-02)."
          echo "ℹ️ Use .github/workflows/frontend-deploy.yml ou promote manual no Vercel."

      - name: 🧾 Registrar logs
        continue-on-error: true
        run: |
          mkdir -p docs/logs
          touch docs/logs/rollback-history.log
          echo "Rollback executado em $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> docs/logs/rollback-history.log
          echo "Workflow com falha: ${{ github.event.workflow_run.name }}" >> docs/logs/rollback-history.log
          echo "Conclusão: ${{ github.event.workflow_run.conclusion }}" >> docs/logs/rollback-history.log
          echo "Commit: ${{ github.event.workflow_run.head_sha }}" >> docs/logs/rollback-history.log
          echo "Branch: ${{ github.event.workflow_run.head_branch }}" >> docs/logs/rollback-history.log
          echo "---" >> docs/logs/rollback-history.log
          echo "✅ Logs registrados com sucesso"

      - name: 📢 Notificar via Slack/Discord (opcional)
        if: env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          echo "📢 Enviando notificação de rollback..."
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"⚠️ ROLLBACK EXECUTADO: Pipeline principal falhou e foi revertido automaticamente"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }} || echo "⚠️ Falha ao enviar notificação Slack"
          
      - name: 📢 Notificar via Discord (opcional)
        if: env.DISCORD_WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          echo "📢 Enviando notificação Discord..."
          curl -X POST -H 'Content-type: application/json' \
            --data '{"content":"⚠️ **ROLLBACK EXECUTADO**\nPipeline principal falhou e foi revertido automaticamente"}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }} || echo "⚠️ Falha ao enviar notificação Discord"

      - name: 📊 Upload logs de rollback
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: rollback-logs-${{ github.run_number }}
          path: docs/logs/rollback-history.log
          retention-days: 30
          if-no-files-found: ignore  # ✅ Não falhar se arquivo não existir
