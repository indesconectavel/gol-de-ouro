# RE.9B.2R.1 / R1 — canal A2R desarmado como deployer.
# Este workflow executa somente auditoria estática. Não acessa Fly, não altera
# secrets e não implanta código. O único deployer de staging permanece
# backend-deploy-staging.yml.
name: A2R — Sandbox Contract Audit (Read-only)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite AUDIT para confirmar a auditoria estática'
        required: true
        default: ''
        type: string

permissions:
  contents: read

jobs:
  contract-audit:
    name: A2R contract audit — no runtime mutation
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    concurrency:
      group: fly-staging-deployment-contract-goldeouro-backend-staging
      cancel-in-progress: false

    steps:
      - name: Guard — confirmação read-only
        run: |
          set -euo pipefail
          test "${{ github.event.inputs.confirm }}" = "AUDIT" || {
            echo "Confirmação inválida — digite AUDIT."
            exit 1
          }

      - name: Checkout para auditoria estática
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Certificar autoridade do deployer canônico
        run: |
          set -euo pipefail
          CANONICAL=".github/workflows/backend-deploy-staging.yml"
          MANIFEST="docs/payment-engine/staging/release-manifest.json"

          test -f "$CANONICAL"
          test -f "$MANIFEST"
          grep -q 'workflow_dispatch:' "$CANONICAL"
          grep -q 'docs/payment-engine/staging/release-manifest.json' "$CANONICAL"
          test "$(jq -r '.authority.canonical' "$MANIFEST")" = "true"
          test "$(jq -r '.authority.operational' "$MANIFEST")" = "true"
          test "$(jq -r '.target.environment' "$MANIFEST")" = "staging"
          test "$(jq -r '.target.app' "$MANIFEST")" = "goldeouro-backend-staging"

          echo "A2R audit-only: autoridade operacional pertence ao deployer canônico."

      - name: Resumo
        run: |
          echo "A2R não possui capacidade de deploy ou mutação de runtime."
          echo "Nenhum acesso a Fly, secrets, banco, staging ou produção foi realizado."
