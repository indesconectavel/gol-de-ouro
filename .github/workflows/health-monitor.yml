name: 🔍 Health Monitor – Gol de Ouro

on:
  schedule:
    - cron: "*/30 * * * *" # Executa a cada 30 minutos - OTIMIZADO PARA REDUZIR CUSTOS
  workflow_dispatch:

permissions:
  contents: write  # ✅ NECESSÁRIO para commits
  actions: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # ✅ AUMENTADO para evitar timeouts

    steps:
      - name: Checkout código
        uses: actions/checkout@v6

      - name: Criar diretórios de logs
        run: |
          mkdir -p docs/logs
          touch docs/logs/health-summary.log
          touch docs/logs/health-fails.log
          echo "✅ Diretórios de logs criados e arquivos inicializados"

      - name: Verificar backend (Fly.io)
        id: backend-check
        continue-on-error: true  # ✅ Não falhar workflow inteiro
        run: |
          echo "Verificando backend..."
          
          # Retry logic: 3 tentativas com 30s de timeout cada
          STATUS_BACKEND="000"
          for i in {1..3}; do
            echo "Tentativa $i de 3..."
            STATUS_BACKEND=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://goldeouro-backend-v2.fly.dev/health || echo "000")
            echo "Backend HTTP: $STATUS_BACKEND"
            
            if [ "$STATUS_BACKEND" = "200" ]; then
              echo "✅ Backend online na tentativa $i"
              echo "status=success" >> $GITHUB_OUTPUT
              echo "✅ Backend ONLINE - $(date)" >> docs/logs/health-summary.log
              exit 0
            fi
            
            if [ $i -lt 3 ]; then
              echo "⏳ Aguardando 10s antes da próxima tentativa..."
              sleep 10
            fi
          done
          
          # Se chegou aqui, todas as tentativas falharam
          echo "⚠️ Backend com instabilidade após 3 tentativas (HTTP: $STATUS_BACKEND)"
          echo "Backend status: $STATUS_BACKEND" >> docs/logs/health-fails.log
          echo "⚠️ Backend WARNING - $(date)" >> docs/logs/health-summary.log
          echo "status=warning" >> $GITHUB_OUTPUT
          echo "::warning::Backend com instabilidade"

      - name: Verificar frontend (Vercel)
        id: frontend-check
        run: |
          echo "Verificando frontend..."
          # Retry logic: 3 tentativas
          STATUS_FRONT="000"
          for i in {1..3}; do
            echo "Tentativa FRONT $i de 3..."
            STATUS_FRONT=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://goldeouro.lol)
            echo "Frontend HTTP: $STATUS_FRONT"
            if [ "$STATUS_FRONT" = "200" ]; then
              echo "✅ Frontend online na tentativa $i"
              break
            fi
            if [ $i -lt 3 ]; then
              echo "⏳ Aguardando 10s antes da próxima tentativa..."
              sleep 10
            fi
          done
          echo "Frontend HTTP: $STATUS_FRONT"
          echo "status=$STATUS_FRONT" >> $GITHUB_OUTPUT
          
          if [ "$STATUS_FRONT" != "200" ]; then
            echo "❗ Frontend com instabilidade (não fatal)"
            echo "Frontend status: $STATUS_FRONT" >> docs/logs/health-fails.log
            echo "⚠️ Frontend WARNING - $(date)" >> docs/logs/health-summary.log
          else
            echo "✅ Frontend online"
            echo "✅ Frontend ONLINE - $(date)" >> docs/logs/health-summary.log
          fi

      - name: Verificar banco de dados (Supabase)
        id: supabase-check
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Verificando banco de dados..."
          # ✅ Verificação explícita de tokens antes de usar
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_KEY }}" ]; then
            echo "⚠️ Credenciais Supabase não configuradas. Pulando verificação."
            echo "⚠️ Supabase SKIP - $(date)" >> docs/logs/health-summary.log
            exit 0
          fi
          
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_KEY" ]; then
            SUCCESS=false
            for i in {1..3}; do
              echo "Tentativa DB $i de 3..."
              curl -s -H "apikey: $SUPABASE_KEY" --max-time 15 "$SUPABASE_URL/rest/v1" > /dev/null
              if [ $? -eq 0 ]; then
                SUCCESS=true
                break
              fi
              if [ $i -lt 3 ]; then
                echo "⏳ Aguardando 10s antes da próxima tentativa..."
                sleep 10
              fi
            done
            if [ "$SUCCESS" = true ]; then
              echo "✅ Banco de dados operacional"
              echo "✅ Supabase ONLINE - $(date)" >> docs/logs/health-summary.log
            else
              echo "❗ Supabase com instabilidade (não fatal)"
              echo "⚠️ Supabase WARNING - $(date)" >> docs/logs/health-summary.log
            fi
          else
            echo "⚠️ Credenciais Supabase não configuradas"
            echo "⚠️ Supabase SKIP - $(date)" >> docs/logs/health-summary.log
          fi

      - name: Verificar admin panel
        id: admin-check
        run: |
          echo "Verificando admin panel..."
          STATUS_ADMIN="000"
          for i in {1..3}; do
            echo "Tentativa ADMIN $i de 3..."
            STATUS_ADMIN=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://admin.goldeouro.lol)
            echo "Admin HTTP: $STATUS_ADMIN"
            if [ "$STATUS_ADMIN" = "200" ]; then
              echo "✅ Admin online na tentativa $i"
              break
            fi
            if [ $i -lt 3 ]; then
              echo "⏳ Aguardando 10s antes da próxima tentativa..."
              sleep 10
            fi
          done
          echo "Admin HTTP: $STATUS_ADMIN"
          echo "status=$STATUS_ADMIN" >> $GITHUB_OUTPUT
          
          if [ "$STATUS_ADMIN" != "200" ]; then
            echo "❗ Admin com instabilidade (não fatal)"
            echo "Admin status: $STATUS_ADMIN" >> docs/logs/health-fails.log
            echo "⚠️ Admin WARNING - $(date)" >> docs/logs/health-summary.log
          else
            echo "✅ Admin panel online"
            echo "✅ Admin ONLINE - $(date)" >> docs/logs/health-summary.log
          fi

      - name: Gerar relatório de saúde
        run: |
          echo "📊 Gerando relatório de saúde..."
          echo "=== RELATÓRIO DE SAÚDE - $(date) ===" > docs/logs/health-report.md
          echo "Backend: ${{ steps.backend-check.outputs.status }}" >> docs/logs/health-report.md
          echo "Frontend: ${{ steps.frontend-check.outputs.status }}" >> docs/logs/health-report.md
          echo "Admin: ${{ steps.admin-check.outputs.status }}" >> docs/logs/health-report.md
          echo "Supabase: $(if [ -n "$SUPABASE_URL" ]; then echo "Configurado"; else echo "Não configurado"; fi)" >> docs/logs/health-report.md
          echo "================================" >> docs/logs/health-report.md

      - name: Upload relatório de saúde
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: health-report-${{ github.run_number }}
          path: docs/logs/health-report.md
          retention-days: 7

      - name: Gerar relatório diário de saúde
        run: |
          echo "📊 Relatório de monitoramento - $(date)" > docs/RELATORIO-HEALTH-MONITOR.md
          echo "" >> docs/RELATORIO-HEALTH-MONITOR.md
          echo "Últimas verificações:" >> docs/RELATORIO-HEALTH-MONITOR.md
          if [ -f "docs/logs/health-summary.log" ]; then
            tail -n 20 docs/logs/health-summary.log >> docs/RELATORIO-HEALTH-MONITOR.md
          else
            echo "Nenhuma verificação anterior encontrada" >> docs/RELATORIO-HEALTH-MONITOR.md
          fi

      # REMOVIDO: git push origin main — evitava disparo indirecto de workflows (push à main).
      # Relatórios permanecem como artifact (step "Upload relatório de saúde").
      - name: Commitar relatórios
        if: github.ref == 'refs/heads/main'  # ✅ Apenas em main
        run: |
          echo "ℹ️ Commit/push automático desativado (unificação pipeline 2026-04-02)."
          echo "ℹ️ Ver artifact health-report-* e docs/logs gerados neste run."

      - name: Enviar alerta (Slack/Discord)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
            --data "{\"content\":\"⚠️ *Gol de Ouro alerta:* Um dos serviços está offline! Verifique o pipeline no GitHub Actions.\"}" \
            $DISCORD_WEBHOOK_URL || true
          fi
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"⚠️ Gol de Ouro alerta: Um dos serviços está offline! Verifique o pipeline no GitHub Actions.\"}" \
            $SLACK_WEBHOOK_URL || true
          fi
