name: 🔒 Configurar Segurança Automática

on:
  workflow_dispatch:  # Execução manual
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/configurar-seguranca.yml'

permissions:
  contents: read

jobs:
  configurar-branch-protection:
    name: 🔒 Configurar Branch Protection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # Não falhar workflow se não conseguir configurar
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 🔒 Configurar Branch Protection Rules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = 'indesconectavel';
            const repo = 'gol-de-ouro';
            const branch = 'main';
            
            try {
              // Configurar Branch Protection
              await github.rest.repos.updateBranchProtection({
                owner: owner,
                repo: repo,
                branch: branch,
                required_status_checks: {
                  strict: true,
                  contexts: [
                    'CI',
                    'Testes Automatizados',
                    'Segurança e Qualidade'
                  ]
                },
                enforce_admins: false, // Não aplicar para administradores
                required_pull_request_reviews: {
                  required_approving_review_count: 1,
                  dismiss_stale_reviews: true,
                  require_code_owner_reviews: false
                },
                restrictions: null, // Permitir que todos possam criar PRs
                allow_force_pushes: false,
                allow_deletions: false,
                required_linear_history: false
              });
              
              console.log('✅ Branch Protection Rules configuradas com sucesso!');
              console.log(`   Branch: ${branch}`);
              console.log(`   Required approvals: 1`);
              console.log(`   Status checks: CI, Testes Automatizados, Segurança e Qualidade`);
            } catch (error) {
              if (error.status === 404) {
                console.log('⚠️ Branch Protection não pode ser configurada (requer permissões de administrador)');
                console.log('💡 Configure manualmente: https://github.com/indesconectavel/gol-de-ouro/settings/branches');
                // Não falhar o workflow - apenas avisar
              } else if (error.status === 403) {
                console.log('⚠️ Token não tem permissões suficientes');
                console.log('💡 Configure manualmente: https://github.com/indesconectavel/gol-de-ouro/settings/branches');
                // Não falhar o workflow - apenas avisar
              } else {
                console.log('⚠️ Erro ao configurar Branch Protection:', error.message);
                console.log('💡 Isso é normal - Branch Protection precisa ser configurada manualmente');
                console.log('💡 Configure manualmente: https://github.com/indesconectavel/gol-de-ouro/settings/branches');
                // Não falhar o workflow - apenas avisar
              }
            }

  configurar-secret-scanning:
    name: 🔍 Habilitar Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # Não falhar workflow se não conseguir habilitar
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 🔍 Habilitar Secret Scanning
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = 'indesconectavel';
            const repo = 'gol-de-ouro';
            
            try {
              // Habilitar Vulnerability Alerts (inclui Secret Scanning)
              await github.rest.repos.enableVulnerabilityAlerts({
                owner: owner,
                repo: repo
              });
              
              console.log('✅ Secret Scanning habilitado com sucesso!');
            } catch (error) {
              if (error.status === 404 || error.status === 403) {
                console.log('⚠️ Secret Scanning não pode ser habilitado via API');
                console.log('💡 Isso é normal - Secret Scanning precisa ser habilitado manualmente');
                console.log('💡 Configure manualmente: https://github.com/indesconectavel/gol-de-ouro/settings/security');
                console.log('   Role até "Code security and analysis" e clique em "Enable" em "Secret scanning"');
              } else {
                console.log('⚠️ Erro ao habilitar Secret Scanning:', error.message);
                console.log('💡 Isso é normal - Secret Scanning precisa ser habilitado manualmente');
                // Não falhar o workflow se não conseguir habilitar
              }
            }

  verificar-configuracao:
    name: ✅ Verificar Configuração
    runs-on: ubuntu-latest
    needs: [configurar-branch-protection, configurar-secret-scanning]
    if: always()  # Executar mesmo se jobs anteriores falharem
    timeout-minutes: 5
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: ✅ Verificar Branch Protection
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = 'indesconectavel';
            const repo = 'gol-de-ouro';
            const branch = 'main';
            
            try {
              const protection = await github.rest.repos.getBranchProtection({
                owner: owner,
                repo: repo,
                branch: branch
              });
              
              console.log('✅ Branch Protection está configurada!');
              console.log(`   Required approvals: ${protection.data.required_pull_request_reviews?.required_approving_review_count || 0}`);
              console.log(`   Force pushes: ${protection.data.allow_force_pushes ? 'Permitido' : 'Bloqueado'}`);
              console.log(`   Deletions: ${protection.data.allow_deletions ? 'Permitido' : 'Bloqueado'}`);
            } catch (error) {
              if (error.status === 404) {
                console.log('⚠️ Branch Protection não está configurada');
                console.log('💡 Isso é normal - Branch Protection precisa ser configurada manualmente');
                console.log('💡 Configure manualmente: https://github.com/indesconectavel/gol-de-ouro/settings/branches');
              } else {
                console.log('⚠️ Erro ao verificar Branch Protection:', error.message);
                console.log('💡 Isso é normal - Verifique manualmente em Settings > Branches');
              }
            }
      
      - name: ✅ Verificar Secret Scanning
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = 'indesconectavel';
            const repo = 'gol-de-ouro';
            
            try {
              const repoInfo = await github.rest.repos.get({
                owner: owner,
                repo: repo
              });
              
              const secretScanning = repoInfo.data.security_and_analysis?.secret_scanning?.status;
              
              if (secretScanning === 'enabled') {
                console.log('✅ Secret Scanning está habilitado!');
              } else {
                console.log('⚠️ Secret Scanning não está habilitado');
                console.log('💡 Configure manualmente: https://github.com/indesconectavel/gol-de-ouro/settings/security');
              }
            } catch (error) {
              console.log('⚠️ Erro ao verificar Secret Scanning:', error.message);
              console.log('💡 Isso é normal - Verifique manualmente em Settings > Security');
            }
      
      - name: 📊 Resumo
        run: |
          echo "## 🔒 Resumo da Configuração de Segurança" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Configurações Aplicadas:" >> $GITHUB_STEP_SUMMARY
          echo "- Branch Protection Rules" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Scanning" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Próximos Passos:" >> $GITHUB_STEP_SUMMARY
          echo "1. Verificar Branch Protection: https://github.com/indesconectavel/gol-de-ouro/settings/branches" >> $GITHUB_STEP_SUMMARY
          echo "2. Verificar Secret Scanning: https://github.com/indesconectavel/gol-de-ouro/settings/security" >> $GITHUB_STEP_SUMMARY
          echo "3. Configurar notificações: https://github.com/settings/notifications" >> $GITHUB_STEP_SUMMARY

